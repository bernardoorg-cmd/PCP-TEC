function renderPedidos(){
  const ordered = getOrderedPedidos();
  const useDefaultView = shouldUseDefaultPedidosView();
  const list=ordered.filter(p=>{
    const mq=!pedSearch||((p.at||'')+(p.cliente||'')+(p.cidade||'')).toLowerCase().includes(pedSearch);
    const ml=!pedFsetores.length || pedFsetores.some(f=>matchPedidoLocalizacao(p, f));
    const ma=!pedFano||String(p.ano)===pedFano;
    const mm=!pedFMeses.length||pedFMeses.includes(String(p.mes||''));
    const mp=!pedFpersiana||(pedFpersiana==='sim'?isPersianaValida(p.persiana):!isPersianaValida(p.persiana));
    const md=matchesPedidosViewMode(p);
    return mq&&ml&&ma&&mm&&mp&&md;
  });
  const totalURP=urpTotal(list).toFixed(2);
  const totalPersianas=subtotalPersianas(list).toFixed(0);
  const selectedUrpSum = getSelectedUrpSum(list);
  const selectedUrpCount = list.filter(p=>isUrpSelected(p.id)).length;
  const dragEnabled = can('editar') && !hasPedidoFilters();

  const rows=list.map((p,i)=>{
    const cpBg=COR_PED_BG[p.corPed]||'#f8f8f8', cpFg=COR_PED_FG[p.corPed]||'#333';
    const ri=p.ressalvas&&p.ressalvas.length?`<span style="color:#e07b1a;font-size:10px;margin-left:3px;cursor:pointer" title="${p.ressalvas[p.ressalvas.length-1].texto}" onclick="openDet('${p.id}')">⚠${p.ressalvas.length}</span>`:'';
    const ps=prazoStyle(p.prazo);
    const bRow=i%2===0?'#fff':'#f0f4f0';
    let ac=`<button onclick="openDet('${p.id}')" style="padding:3px 7px;border:1px solid var(--ph);background:#fff;color:var(--ph);border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">Ver</button>`;
    if(can('avancar')&&p.setor&&!p.setor.includes('5. Entregue')&&deriveStatusFromSetor(p.setor)!=='Finalizado')
      ac+=` <button onclick="avancarSetor('${p.id}')" style="padding:3px 7px;border:1px solid var(--pconcl);background:#fff;color:var(--pconcl);border-radius:3px;cursor:pointer;font-size:10px;font-weight:700" title="Avançar setor">›</button>`;
    if(can('coleta')&&(((p.setor||'').includes('4. Expedi')) || p.status==='Aguardando coleta'))
      ac+=` <button onclick="openColeta('${p.id}')" style="padding:3px 7px;background:var(--pcoleta);border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:10px;font-weight:700">Coleta</button>`;
    if(can('deletar')&&p.status!=='Finalizado')
      ac+=` <button onclick="confirmDelete('${p.id}')" style="padding:3px 7px;border:1px solid #cc2222;background:#fff;color:#cc2222;border-radius:3px;cursor:pointer;font-size:10px" title="Excluir">✕</button>`;

    const editCell=(field, value, type='text')=>can('editar')
      ? `<td class="editable-cell" style="border:1px solid var(--pbor);padding:5px 7px;cursor:pointer" ondblclick="startInlineEdit('${p.id}','${field}',this,'${type}')" title="Duplo clique para editar">${value||'—'}</td>`
      : `<td style="border:1px solid var(--pbor);padding:5px 7px">${value||'—'}</td>`;

    const dragTd = dragEnabled
      ? `<td class="drag-col" style="border:1px solid var(--pbor);padding:5px 4px"><span class="drag-handle" title="Arrastar para reordenar" draggable="true" ondragstart="handleDragStart(event,'${p.id}')" ondragend="handleDragEnd()">⋮⋮</span></td>`
      : `<td class="drag-col" style="border:1px solid var(--pbor);padding:5px 4px;color:#ccc">⋮⋮</td>`;

    // Build cell map keyed by column key
    const cellMap = {
      ano:      `<td style="border:1px solid var(--pbor);padding:5px 7px;color:#888;font-size:10px">${p.ano||'—'}</td>`,
      mes:      `<td style="border:1px solid var(--pbor);padding:5px 7px;font-weight:700;color:var(--ph)">${(p.mes||'').replace(/^\d+\. /,'')}</td>`,
      id:       `<td style="border:1px solid var(--pbor);padding:5px 7px;text-align:center"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;font-size:11px;font-weight:700;color:#fff;background:${COR_SEMANA_BADGE[p.corSemana]||'#555'}">${p.numPed||'—'}</span></td>`,
      nomes:    `<td style="border:1px solid var(--pbor);padding:5px 9px;text-align:left">${(p.cliente||'').length>30?(p.cliente||'').substr(0,30)+'…':(p.cliente||'')}${ri}</td>`,
      pedido:   `<td style="border:1px solid var(--pbor);padding:5px 7px;text-align:left;font-weight:700;color:#1a3a6a">${p.at||''}</td>`,
      cidade:   `<td style="border:1px solid var(--pbor);padding:5px 7px">${p.cidade||'—'}</td>`,
      uf:       `<td style="border:1px solid var(--pbor);padding:5px 7px;color:#888">${p.uf||''}</td>`,
      urp:      `<td class="urp-selectable ${isUrpSelected(p.id)?'urp-selected':''}" style="border:1px solid var(--pbor);padding:5px 7px;font-weight:700" onclick="toggleUrpSelection('${p.id}')" title="Clique para selecionar e somar URPs">${(p.urp||0).toFixed(2)}</td>`,
      dtImp:    `<td style="border:1px solid var(--pbor);padding:5px 7px;color:#888">${fmt(p.dtImp)}</td>`,
      setor:    `<td style="border:1px solid var(--pbor);padding:5px 7px">${setorBadge(p.setor)}</td>`,
      prazo:    `<td style="border:1px solid var(--pbor);padding:5px 7px;${ps}">${p.prazo?fmt(p.prazo):'—'}</td>`,
      prioridade:`<td style="border:1px solid var(--pbor);padding:5px 7px">${priorHTML(getPedidoPrior(p))}</td>`,
      prevTEC:  editCell('prevTEC', fmt(p.prevTEC), 'date'),
      conclProd:editCell('conclProd', fmt(p.conclProd), 'date'),
      coleta:   `<td style="border:1px solid var(--pbor);padding:5px 7px;color:${p.coleta?'var(--pcoleta)':'#ccc'};font-weight:${p.coleta?'700':'400'}">${fmt(p.coleta)||'—'}</td>`,
      corPed:   `<td style="border:1px solid var(--pbor);padding:5px 7px"><span style="background:${cpBg};color:${cpFg};border:1px solid #bbb;padding:2px 7px;border-radius:3px;font-size:${(COR_PED_NOMES[p.corPed]||'').includes('Branco e Preto') ? '9px' : '10px'};white-space:nowrap;display:inline-block">${COR_PED_NOMES[p.corPed]||'—'}</span></td>`,
      persiana: `<td style="border:1px solid var(--pbor);padding:5px 7px;color:#666">${p.persiana||'N/A'}</td>`,
      acoes:    `<td class="acoes-col" style="border:1px solid var(--pbor);padding:5px 7px;white-space:nowrap">${ac}</td>`,
    };

    return `<tr style="background:${bRow}" data-pedido-id="${p.id}" ${dragEnabled?`ondragover="handleDragOver(event,'${p.id}')" ondrop="handleDrop(event,'${p.id}')" ondragleave="handleDragLeave(event,'${p.id}')"`:''}>
      ${dragTd}
      ${colOrder.filter(key=>!colHidden.has(key)).map(key=>cellMap[key]||'').join('')}
    </tr>`;
  }).join('');

  const mkSel=(id,v,opts)=>`<select id="${id}" class="sSel" onchange="pedF('${id}',this.value)">${opts.map(([ov,ol])=>`<option value="${ov}"${v===ov?' selected':''}>${ol}</option>`).join('')}</select>`;
  const reorderHint = dragEnabled
    ? `<span class="reorder-hint">↕ Arraste pela alça para mudar a sequência dos pedidos</span>`
    : (can('editar') ? `<span class="reorder-hint warn">Para reordenar, limpe busca e filtros</span>` : '');

  return `<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div class="sheet-toolbar">
      <span class="sheet-title">Pedidos de produção</span>
      <span style="font-size:10px;color:#666;background:#eef3ee;border:1px solid #d8e4d8;border-radius:999px;padding:3px 8px">${getPedidosViewModeLabel()}</span>
      <div style="display:flex;align-items:center;gap:5px;background:#fff;border:1px solid #bbb;border-radius:4px;padding:4px 9px">
        <span style="color:#aaa">⌕</span>
        <input id="ped-search-main" type="text" placeholder="Buscar AT, cliente, cidade..." value="${pedSearch}" oninput="pedF('srch',this.value)" class="sInput" style="border:none;padding:0;min-width:170px;background:none"/>
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="sBtn ${pedViewMode==='padrao'?'green':''}" onclick="setPedidosViewMode('padrao')">Visão padrão</button>
        <button class="sBtn ${pedViewMode==='mesAtual'?'green':''}" onclick="setPedidosViewMode('mesAtual')">Somente período atual</button>
      </div>
      <details class="sStatusMulti" style="position:relative" ${pedOpenMultiFilter==='localizacao'?'open':''} ontoggle="if(this.open) pedOpenMultiFilter='localizacao'">
        <summary class="sBtn" style="list-style:none">${localizacaoFilterLabel()} ▾</summary>
        <div style="position:absolute;top:calc(100% + 4px);left:0;z-index:20;background:#fff;border:1px solid #bbb;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.12);padding:10px;min-width:200px">
          ${['0. Pendente corte','1. Corte','2. Montagem','3. Baixar Intranet','4. Expedição','5. Finalizado'].map(v=>`<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;cursor:pointer"><input type="checkbox" ${pedFsetores.includes(v)?'checked':''} onchange="toggleLocalizacaoFilter('${v}', this.checked)"/> ${v}</label>`).join('')}
          <div style="display:flex;justify-content:flex-end;margin-top:8px">
            <button type="button" class="sBtn" style="padding:4px 8px;font-size:10px" onclick="clearLocalizacaoFilter()">Limpar</button>
          </div>
        </div>
      </details>
      <details class="sStatusMulti" style="position:relative" ${pedOpenMultiFilter==='mes'?'open':''} ontoggle="if(this.open) pedOpenMultiFilter='mes'">
        <summary class="sBtn" style="list-style:none">Mês: ${monthFilterLabel()} ▾</summary>
        <div style="position:absolute;top:calc(100% + 4px);left:0;z-index:20;background:#fff;border:1px solid #bbb;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.12);padding:10px;min-width:200px;max-height:260px;overflow:auto">
          ${MONTH_OPTIONS.map(v=>`<label style="display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;cursor:pointer"><input type="checkbox" ${pedFMeses.includes(v)?'checked':''} onchange="toggleMonthFilter('${v}', this.checked)"/> ${v.replace(/^\d+\. /,'')}</label>`).join('')}
          <div style="display:flex;justify-content:flex-end;margin-top:8px">
            <button type="button" class="sBtn" style="padding:4px 8px;font-size:10px" onclick="clearMonthFilter()">Limpar</button>
          </div>
        </div>
      </details>
      ${mkSel('fano',pedFano,[['','Todos os anos'],['2026','2026'],['2025','2025']])}
      ${mkSel('fpersiana',pedFpersiana,[['','Persiana: todos'],['sim','Com persiana'],['nao','Sem persiana']])}
      <span class="urp-total">Total: ${totalURP} URPs</span>
      <span class="urp-total" style="background:#6b7280">Subtotal persianas: ${totalPersianas}</span>
      ${selectedUrpCount>0 ? `<span class="urp-total" style="background:#0f766e">URPs selecionadas: ${selectedUrpSum.toFixed(2)} (${selectedUrpCount})</span><button class="sBtn" onclick="clearUrpSelection()">Limpar seleção</button>` : ``}
      ${can('criar')?`<button class="sBtn green" onclick="openModal('novo')">+ Novo pedido</button>`:''}
      ${can('exportar')?`<button class="sBtn teal" onclick="exportExcel()">↓ Exportar Excel</button>`:''}
      ${can('exportar')?`<button class="sBtn" onclick="printReport()">🖨 Imprimir relatório</button>`:''}
      ${can('importar')?`<button class="sBtn orange" onclick="openModal('importar')">↑ Importar Excel</button>`:''}
      <button class="sBtn" onclick="openModal('colunas')" title="Mostrar/ocultar colunas" style="display:flex;align-items:center;gap:4px">⊞ <span>Colunas${colHidden.size>0 ? (' <span style="background:#e07b1a;color:#fff;border-radius:10px;padding:0 5px;font-size:9px;font-weight:700">' + colHidden.size + '</span>') : ''}</span></button>
      ${can('editar')?`<span style="font-size:10px;color:#888;margin-left:4px">✎ Duplo clique na célula para editar</span>`:''}
      ${reorderHint}
    </div>
    <div class="tbl-outer">
      <table class="sheet">
        <thead><tr>
          <th class="th-main drag-col" title="Reordenar linhas">↕</th>
          ${colOrder.filter(key=>!colHidden.has(key)).map(key=>{
            const c=COL_DEFS.find(x=>x.key===key); if(!c) return '';
            const wideStyle=c.wide?'min-width:160px;text-align:left':'';
            return `<th class="${c.cls}" style="${wideStyle}" draggable="true"
              ondragstart="colDragStart(event,'${c.key}')"
              ondragover="colDragOver(event,'${c.key}')"
              ondrop="colDrop(event,'${c.key}')"
              ondragleave="colDragLeave(event,'${c.key}')"
              ondragend="colDragEnd()"
              title="Arrastar para mover coluna">${c.label}</th>`;
          }).join('')}
        </tr></thead>
        <tbody>${rows||`<tr><td colspan="19" style="text-align:center;padding:20px;color:#aaa;border:1px solid var(--pbor)">Nenhum pedido encontrado</td></tr>`}</tbody>
      </table>
    </div>
  </div>`;
}

function renderEfetividade(){
  const periodKey = (/^\d{4}-\d{2}$/.test(efetividadeWeekSel||'') ? efetividadeWeekSel : getMonthKey(new Date()));
  const rng = getPeriodoProdutivo(periodKey) || getPeriodoProdutivo(getMonthKey(new Date()));
  const selected = getEfetividadeReg(periodKey) || {
    periodKey,
    monthKey: periodKey,
    periodStart: rng.startISO,
    periodEnd: rng.endISO,
    periodLabel: rng.periodLabel,
    horasTrabalhadas: '',
    horasExtras: '',
    horasImprodutivas: ''
  };
  const selectedEnriched = enrichEfetividadeReg({
    ...selected,
    periodKey,
    monthKey: periodKey,
    periodStart: rng.startISO,
    periodEnd: rng.endISO,
    periodLabel: rng.periodLabel
  });
  const latestBase = efetividadeRegs
    .filter(r=>r.periodKey || r.monthKey)
    .slice()
    .sort((a,b)=>String(b.periodStart||b.weekStart||'').localeCompare(String(a.periodStart||a.weekStart||'')))[0] || selected;
  const latest = enrichEfetividadeReg(latestBase);
  const month = getEfetividadePeriodo(periodKey);
  const urpLabel = 'URPs concluídas no período';
  const hist = efetividadeRegs
    .filter(r=>r.periodKey || r.monthKey)
    .slice()
    .sort((a,b)=>String(b.periodStart||b.weekStart||'').localeCompare(String(a.periodStart||a.weekStart||'')))
    .slice(0,12)
    .map(r=>{
      const e = enrichEfetividadeReg(r);
      const pk = r.periodKey || r.monthKey || r.weekKey;
      const label = r.periodLabel || `${fmt(r.periodStart || r.weekStart)} a ${fmt(r.periodEnd || r.weekEnd)}`;
      return `<tr>
        <td>${pk}</td>
        <td>${label}</td>
        <td>${e.urpsFinalizadas.toFixed(2)}</td>
        <td>${normalizeHours(r.horasTrabalhadas).toFixed(1)}</td>
        <td>${normalizeHours(r.horasExtras).toFixed(1)}</td>
        <td>${normalizeHours(r.horasImprodutivas).toFixed(1)}</td>
        <td>${fmtPct(e.efetiv)}</td>
        <td><span class="efet-badge ${e.faixa.cls}">${e.faixa.label}</span></td>
        <td style="white-space:nowrap">
          <button class="sBtn" onclick="editarPeriodoEfetividade('${pk}')">Editar</button>
          ${(CU && (CU.role==='admin' || can('editar'))) ? `<button class="sBtn red" onclick="deleteEfetividadePeriodo('${pk}')">Excluir</button>` : ''}
        </td>
      </tr>`;
    }).join('');
  return `<div class="efet-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px">
      <div style="font-size:16px;font-weight:700;color:var(--ph)">Efetividade</div>
      <div class="efet-mini">Efetiv = URPs concluídas no período / (horas trabalhadas + horas extras - horas improdutivas)</div>
    </div>

    <div class="efet-kpi-wrap">
      <div class="efet-kpi efet-${latest.faixa.cls}">
        <div class="lbl">Último período lançado</div>
        <div class="val">${fmtPct(latest.efetiv)}</div>
        <div class="sub">${latest.periodKey || latest.monthKey || 'Sem lançamento'} · ${latest.urpsFinalizadas.toFixed(2)} URPs concluídas</div>
        <div style="margin-top:8px"><span class="efet-badge ${latest.faixa.cls}">${latest.faixa.label}</span></div>
      </div>
      <div class="efet-kpi efet-${month.faixa.cls}">
        <div class="lbl">Efetividade do período selecionado</div>
        <div class="val">${fmtPct(month.efetiv)}</div>
        <div class="sub">${month.urps.toFixed(2)} URPs · ${rng.periodLabel}</div>
        <div style="margin-top:8px"><span class="efet-badge ${month.faixa.cls}">${month.faixa.label}</span></div>
      </div>
    </div>

    <div class="efet-grid">
      <div class="efet-card">
        <div class="efet-title">Lançamento do período produtivo</div>
        <div class="info-box">Agora o apontamento é por período fechado do dia 26 ao dia 25. As URPs são calculadas automaticamente pelos pedidos concluídos dentro desse mesmo intervalo.</div>
        <div class="efet-form-grid">
          <div class="mfl"><label>Período</label><input type="month" id="ef-period" value="${periodKey}" onchange="handleEfetividadePeriodChange()"/></div>
          <div class="mfl"><label>${urpLabel}</label><input type="number" step="0.01" id="ef-urps" value="${selectedEnriched.urpsFinalizadas.toFixed(2)}" readonly class="readonly-field"/></div>
          <div class="mfl"><label>Horas trabalhadas do período</label><input type="number" step="0.01" id="ef-htrab" value="${selected.horasTrabalhadas ?? ''}" oninput="updateEfetividadePreview()"/></div>
          <div class="mfl"><label>Horas extras do período</label><input type="number" step="0.01" id="ef-hextra" value="${selected.horasExtras ?? ''}" oninput="updateEfetividadePreview()"/></div>
          <div class="mfl"><label>Horas improdutivas do período</label><input type="number" step="0.01" id="ef-himp" value="${selected.horasImprodutivas ?? ''}" oninput="updateEfetividadePreview()"/></div>
          <div class="mfl"><label>Efetividade prevista</label><div id="ef-prev-box" class="${priorModalCls('NORMAL')}" style="height:38px;display:flex;align-items:center">${fmtPct(selectedEnriched.efetiv)} · ${selectedEnriched.faixa.label}</div></div>
        </div>
        <div class="efet-stat-grid">
          <div class="efet-stat"><div class="l">Competência</div><div class="n">${periodKey}</div></div>
          <div class="efet-stat"><div class="l">Período</div><div class="n" style="font-size:14px">${fmt(rng.startISO)}<br>${fmt(rng.endISO)}</div></div>
          <div class="efet-stat"><div class="l">Horas líquidas</div><div class="n" id="ef-hliq">${(normalizeHours(selected.horasTrabalhadas)+normalizeHours(selected.horasExtras)-normalizeHours(selected.horasImprodutivas)).toFixed(1)}</div></div>
          <div class="efet-stat"><div class="l">Faixa</div><div class="n" id="ef-faixa" style="font-size:16px">${selectedEnriched.faixa.label}</div></div>
        </div>
        <div class="modal-foot" style="margin-top:14px">
          ${can('editar')||can('criar')?`<button class="mBtn green" onclick="saveEfetividadeForm()">Salvar período</button>`:''}
        </div>
      </div>

      <div class="efet-card">

async function deleteEfetividadePeriodo(periodKey){
  if(!(CU && (CU.role==='admin' || can('editar')))){
    showToast('Você não tem permissão para excluir este período.', 'err');
    return;
  }
  if(!confirm(`Excluir o lançamento de efetividade do período ${periodKey}?`)) return;
  try{

    await db.collection('efetividadeSemanal').doc(periodKey).delete();

function mapNcImportRow(row){
  const pick = (...keys) => {
    for(const k of keys){
      if(Object.prototype.hasOwnProperty.call(row,k) && row[k]!==undefined && row[k]!==null) return row[k];
    }
    return '';
  };
  const processo = String(pick('processo','Processo')).trim();
  const defeitoNrRaw = pick('defeitoNr','n do defeito','Nº do defeito','Defeito');
  const defeitoNr = defeitoNrRaw === '' ? '' : String(defeitoNrRaw).trim();
  const draft = {
    dataOcorrencia: toISO(pick('dataOcorrencia','Data da ocorrência','data')),
    idSetor: String(pick('idSetor','ID_Setor','ID setor')).trim(),
    setorOrigem: String(pick('setorOrigem','Setor de origem')).trim(),
    at: String(pick('at','AT','Nº AT')).trim(),
    feld: String(pick('feld','Feld')).trim() || NC_FELD_OPTIONS[0],
    codigo: String(pick('codigo','Código','Codigo')).trim(),
    cor: String(pick('cor','Cor')).trim(),
    reposicao: String(pick('reposicao','Reposição','Reposicao')).trim() || 'Parcial',
    largura: pick('largura','Largura','Largura (mm)'),
    altura: pick('altura','Altura','Altura (mm)'),
    compr: pick('compr','Compr.','Comprimento','Comprimento (mm)'),
    quantidadeQuadros: pick('quantidadeQuadros','Quantidade de quadros','Qtd Quadros','Quadros') || 1,
    disposicao: String(pick('disposicao','Disposição','Disposicao')).trim() || NC_DISPOSICAO_OPTIONS[0],
    processo,
    defeitoNr,
    descricaoOcorrencia: String(pick('descricaoOcorrencia','Descrição/ocorrência','Descricao')).trim(),
    turno: String(pick('turno','Turno')).trim() || NC_TURNO_OPTIONS[0],
    material: String(pick('material','PVC/Alumínio','PVC/Aluminio','Material')).trim() || NC_MATERIAL_OPTIONS[0],
    grupo: String(pick('grupo','Grupo')).trim() || NC_GRUPO_OPTIONS[0],
    observacoes: String(pick('observacoes','Observações','Observacoes')).trim()
  };
  recalcNcDraft(draft);
  return {
    ...draft,
    criadoPorUid: CU ? CU.uid : '',
    criadoPorNome: CU ? CU.name : '',
    criadoEm: firebase.firestore.FieldValue.serverTimestamp(),
    atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
  };
}

async function triggerNcImport(){
  if(!(can('apontar_nc')||CU.role==='admin')){
    showToast('Você não tem permissão para importar NC.','err');
    return;
  }
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.xlsx,.xls';
  input.onchange = async (ev) => {
    const file = ev.target.files && ev.target.files[0];
    if(!file) return;
    showLoading('Importando não conformidades...');
    try{
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, {type:'array', cellDates:true});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){
        hideLoading();
        showToast('Planilha vazia.','info');
        return;
      }
      const mapped = rows.map(mapNcImportRow).filter(Boolean);
      const batchSize = 250;
      for(let i=0;i<mapped.length;i+=batchSize){
        const chunk = mapped.slice(i, i+batchSize);
        const batch = db.batch();
        chunk.forEach(item => {
          const ref = db.collection('naoConformidades').doc();
          batch.set(ref, item);
        });
        await batch.commit();
      }
      hideLoading();
      showToast(`${mapped.length} NC(s) importadas com sucesso.`,'ok',3500);
    }catch(e){
      hideLoading();
      showToast('Erro ao importar NC: '+e.message,'err',5000);
    }
  };
  input.click();
}

      'Compr. (mm)': r.compr || '',
      'Quant. m': r.quantM || 0,
      'Peso (kg)': r.pesoKg || 0,
      'Quantidade de quadros': r.quantidadeQuadros || 1,
      'Disposição': r.disposicao || '',

async function migrarSetoresAntigos(executar){
  const statusEl = document.getElementById('mig-status');
  if(statusEl) statusEl.textContent = executar ? 'Executando migração...' : 'Verificando...';

  try{
    const snap = await db.collection('pedidos').get();
    const afetados = [];
    snap.forEach(doc => {
      const d = doc.data();
      const setor = d.setor || '';
      const status = d.status || '';
      // Detecta setores antigos
      if(setor === '3. Expedição' || setor === '4. Entregue' ||
         setor.startsWith('3. Expedi') || setor.startsWith('4. Entregue')){
        afetados.push({ id: doc.id, setorAntigo: setor, statusAntigo: status });
      }
    });

    if(!afetados.length){
      if(statusEl) statusEl.innerHTML = '<span style="color:#1e5a3a">✓ Nenhum pedido com setor antigo encontrado. Já está tudo atualizado!</span>';
      return;
    }

    if(!executar){
      if(statusEl) statusEl.innerHTML =
        `<span style="color:#cc6600">⚠ ${afetados.length} pedido(s) com setor antigo:<br>` +
        afetados.map(a=>`• ${a.id.substring(0,8)}… → setor: <strong>${a.setorAntigo}</strong>`).join('<br>') +
        `</span>`;
      return;
    }

    // Executar migração em batch
    showLoading('Migrando ' + afetados.length + ' pedido(s)...');
    let ok = 0, errs = 0;
    // Firestore batch limit = 500
    for(let i = 0; i < afetados.length; i += 400){
      const chunk = afetados.slice(i, i + 400);
      const batch = db.batch();
      chunk.forEach(p => {
        let novoSetor = p.setorAntigo;
        let novoStatus = p.statusAntigo;
        if(p.setorAntigo === '3. Expedição' || p.setorAntigo.startsWith('3. Expedi')){
          novoSetor = '4. Expedição';
          novoStatus = 'Aguardando coleta';
        } else if(p.setorAntigo === '4. Entregue' || p.setorAntigo.startsWith('4. Entregue')){
          novoSetor = '5. Entregue';
          novoStatus = 'Finalizado';
        }
        batch.update(db.collection('pedidos').doc(p.id), {
          setor: novoSetor,
          status: novoStatus,
          atualizadoEm: firebase.firestore.FieldValue.serverTimestamp()
        });
      });
      try{ await batch.commit(); ok += chunk.length; }
      catch(e){ errs += chunk.length; console.error('Batch erro:', e); }
    }
    hideLoading();
    const msg = ok + ' pedido(s) migrado(s) com sucesso' + (errs ? ', ' + errs + ' erro(s)' : '') + '.';
    if(statusEl) statusEl.innerHTML = `<span style="color:#1e5a3a">✓ ${msg}</span>`;
    showToast(msg, errs ? 'info' : 'ok', 5000);
    render();
  } catch(e){
    hideLoading();
    const msg = 'Erro na migração: ' + e.message;
    if(statusEl) statusEl.textContent = msg;
    showToast(msg, 'err', 7000);
  }
}

function addAlmoxSetor(){
  const inp = $('nas-input');
  if(!inp) return;
  const val = inp.value.trim();
  if(!val){ showToast('Digite o nome do setor.','info'); return; }
  if(almoxSetores.includes(val)){ showToast('Setor já existe.','info'); return; }
  almoxSetores = [...almoxSetores, val];
  inp.value = '';
  saveConfig();
  render();
}
function rmAlmoxSetor(i){
  almoxSetores = almoxSetores.filter((_,idx)=>idx!==i);

  render();

  </div></div>`;

function toggleColVisibility(key){
  if(colHidden.has(key)) colHidden.delete(key);
  else {
    // Garante que pelo menos 1 coluna fica visível
    const visibleCount = COL_DEFS.filter(c=>!colHidden.has(c.key)).length;
    if(visibleCount<=1){ showToast('Pelo menos uma coluna deve estar visível.','info'); return; }
    colHidden.add(key);
  }
  render();
}

function setAllColsVisible(show){
  if(show) colHidden.clear();
  else {
    // Mantém só 'acoes' visível ao ocultar tudo
    COL_DEFS.forEach(c=>{ if(c.key!=='acoes') colHidden.add(c.key); });
  }
  render();
}

function atualizarPrior(){
  const prazo=($('f-prazo')||{value:''}).value;
  const p=calcPrior(prazo, '0. Pendente corte'); const el=$('prior-display');
  if(el){ el.className=priorModalCls(p); el.textContent=priorTxt(p); }
}
function togglePersiana(){
  const v=($('f-pers-tipo')||{value:'nao'}).value;
  const w=$('pers-num-wrap'); if(w) w.style.display=v==='sim'?'block':'none';
}

async function salvarPedido(){
  const at  = ($('f-at')||{value:''}).value.trim();
  const cli = ($('f-cli')||{value:''}).value.trim();
  const urp = parseFloat(($('f-urp')||{value:0}).value)||0;
  if(!at||!cli){ showToast('Preencha AT e cliente.','err'); return; }
  const prazo    = ($('f-prazo')||{value:''}).value;
  const persTipo = ($('f-pers-tipo')||{value:'nao'}).value;
  const persNum  = ($('f-pers-num')||{value:''}).value.trim();
  const persiana = persTipo==='sim'?(persNum||'Sim'):'N/A';
  const mes = ($('f-mes')||{value:'4. ABRIL'}).value;
  const ano = parseInt(($('f-ano')||{value:'2026'}).value);
  const seq = pedidos.filter(p=>p.mes===mes&&p.ano===ano).length+1;
  const checklistExpedicao = (()=>{
    try{ return JSON.parse(novoPedidoDraft['f-checklist-json']||'[]'); }
    catch{ return []; }
  })();
  const totalPosicoes = checklistExpedicao.length;
  const urpChecklist = checklistExpedicao.reduce((a,i)=>a+(parseFloat(i.urp)||0),0);
  const data = {
    seq, ano, mes, at, cliente:cli,
    cidade: ($('f-cid')||{value:''}).value.trim(),
    uf:     ($('f-uf')||{value:''}).value.trim().toUpperCase(),
    urp,
    dtImp:  ($('f-dimp')||{value:''}).value,
    setor:  '0. Pendente corte', prazo,
    corSemana: parseInt(($('f-corsem')||{value:'0'}).value),
    corPed:    parseInt(($('f-corped')||{value:'0'}).value),
    numPed: ($('f-nped')||{value:''}).value.trim(),
    prior:  calcPrior(prazo, '0. Pendente corte'),
    prevTEC:($('f-prev')||{value:''}).value,
    montagem:'', conclProd:'', coleta:'',
    status:'Pendente corte', persiana, ressalvas:[],
    checklistExpedicao,
    totalPosicoes,
    urpChecklist: Number(urpChecklist.toFixed(2)),
    pdfChecklistNome: novoPedidoDraft['f-pdf-nome']||'',
    criadoPor: CU.uid, criadoPorNome: CU.name
  };
  showLoading('Salvando pedido...');
  try{ await savePedido(data); clearNovoPedidoDraft(); modalState=null; hideLoading(); showToast('Pedido criado!','ok'); render(); }
  catch(e){ hideLoading(); showToast('Erro: '+e.message,'err'); }
}

async function salvarRes(id){

  catch(e){ showToast('Erro: '+e.message,'err'); }
}

async function reverterSetor(id){
  const s=($('rev-s')||{value:''}).value;
  if(!s){ showToast('Selecione um setor.','err'); return; }
  const status=deriveStatusFromSetor(s);
  try{ const p=pedidos.find(x=>x.id===id); await savePedido({setor:s,status,prior:calcPrior(p?p.prazo:'',s)},id); modalState=null; showToast('Setor revertido!','ok'); render(); }
  catch(e){ showToast('Erro: '+e.message,'err'); }
}

// ── Checklist helpers (must be before renderModalColeta) ──
function formatChecklistUrp(v){
  const n = Number(v||0);
  return Number.isFinite(n) ? n.toFixed(2) : '0.00';
}

function getChecklistStats(p){
  const itens = Array.isArray(p && p.checklistExpedicao) ? p.checklistExpedicao : [];
  const total = itens.length;
  const conferidos = itens.filter(i=>!!i.conferido).length;
  const urp = itens.reduce((a,i)=>a + (parseFloat(i.urp)||0),0);
  return { total, conferidos, pendentes: Math.max(0,total-conferidos), urp };
}

function updateNovoPedidoChecklistMeta(parsed){
  novoPedidoDraft = {
    ...novoPedidoDraft,
    'f-pdf-nome': parsed.fileName || '',
    'f-checklist-json': JSON.stringify(parsed.posicoes || []),
    'f-checklist-total': String((parsed.posicoes || []).length),
    'f-checklist-quadros': String(parsed.totalQuadros || 0),
    'f-checklist-urp': String(Number(parsed.totalUrp||0).toFixed(2))
  };
}

function normalizePdfDecimal(value){
  if(value===null || value===undefined) return 0;
  let s = String(value).trim();
  if(!s) return 0;
  s = s.replace(/\./g,'').replace(',', '.').replace(/[^0-9.-]/g,'');
  const n = parseFloat(s);
  return Number.isFinite(n) ? n : 0;
}

function renderModalColeta(){
  const p=pedidos.find(x=>x.id===coletaId); if(!p) return '';
  const today=new Date().toISOString().split('T')[0];
  const itens = Array.isArray(p.checklistExpedicao) ? p.checklistExpedicao : [];
  const stats = getChecklistStats(p);
  const progresso = stats.total ? Math.round((stats.conferidos/stats.total)*100) : 0;

      <div style="max-height:38vh;overflow-y:auto;border:1px solid #e0e0e0;border-radius:6px">
        <table style="width:100%;border-collapse:collapse;font-size:11px">

              <th style="padding:7px 8px;text-align:left;font-family:Arial;font-size:10px">Posição</th>
              <th style="padding:7px 8px;text-align:center;font-family:Arial;font-size:10px">Qtd</th>

      ${stats.total && progresso < 100 ? `<div style="margin-top:8px;padding:7px 10px;background:#fff8e0;border:1px solid #f5cc6a;border-radius:5px;font-size:11px;font-family:Arial;color:#7a4f00">

  return `<div class="overlay" onclick="if(event.target===this)closeModal()">

    <div class="modal-foot">
      <button class="mBtn" onclick="closeModal()">Cancelar</button>

}

// Helpers para checklist no modal de coleta (operam em cópia local antes de salvar)
let _coletaChecklistRascunho = null;
function _initColetaRascunho(){
  const p = pedidos.find(x=>x.id===coletaId);
  if(!p) return;
  if(!_coletaChecklistRascunho || _coletaChecklistRascunho._id !== coletaId){
    _coletaChecklistRascunho = {
      _id: coletaId,
      itens: Array.isArray(p.checklistExpedicao) ? p.checklistExpedicao.map(i=>({...i})) : []
    };
  }
}
function coletaToggleItem(idx, checked){
  _initColetaRascunho();
  if(!_coletaChecklistRascunho.itens[idx]) return;
  _coletaChecklistRascunho.itens[idx].conferido = !!checked;
  _coletaChecklistRascunho.itens[idx].conferidoEm = checked ? new Date().toISOString() : '';
  _coletaChecklistRascunho.itens[idx].conferidoPor = checked ? (CU&&CU.name?CU.name:'') : '';
  // Update the pedidos local copy so re-render reflects state
  const p = pedidos.find(x=>x.id===coletaId);
  if(p) p.checklistExpedicao = _coletaChecklistRascunho.itens.map(i=>({...i}));
  // Partial re-render of just the table (avoid full modal rebuild while typing)
  render();
}
function coletaSetRessalva(idx, value){
  _initColetaRascunho();
  if(!_coletaChecklistRascunho.itens[idx]) return;
  _coletaChecklistRascunho.itens[idx].ressalva = value;
  const p = pedidos.find(x=>x.id===coletaId);
  if(p) p.checklistExpedicao = _coletaChecklistRascunho.itens.map(i=>({...i}));
}
function coletaMarcarTudo(v){
  _initColetaRascunho();
  const ts = v ? new Date().toISOString() : '';
  const by = v && CU ? CU.name : '';
  _coletaChecklistRascunho.itens = _coletaChecklistRascunho.itens.map(i=>({
    ...i, conferido:!!v, conferidoEm:ts, conferidoPor:by
  }));
  const p = pedidos.find(x=>x.id===coletaId);
  if(p) p.checklistExpedicao = _coletaChecklistRascunho.itens.map(i=>({...i}));
  render();
}

async function confirmarColeta(){
  const dt=($('f-col')||{value:''}).value;
  if(!dt){ showToast('Informe a data.','err'); return; }
  showLoading('Registrando coleta...');
  try{
    const p = pedidos.find(x=>x.id===coletaId);
    // Save checklist rascunho if it was modified
    const checklistFinal = (_coletaChecklistRascunho && _coletaChecklistRascunho._id===coletaId)
      ? _coletaChecklistRascunho.itens
      : (Array.isArray(p&&p.checklistExpedicao) ? p.checklistExpedicao : []);
    const payload = {
      coleta: dt,
      status: 'Finalizado',
      setor: '4. Entregue',
      prior: calcPrior(p?p.prazo:'','4. Entregue'),
      checklistExpedicao: checklistFinal
    };
    await savePedido(payload, coletaId);
    _coletaChecklistRascunho = null;
    modalState=null; hideLoading(); showToast('Coleta registrada!','ok'); render();
  } catch(e){ hideLoading(); showToast('Erro: '+e.message,'err'); }
}

function exportExcel(){
  try{
    const headers=['Ano','Mês','ID/Seq','Cor Semana','Pedido (AT)','Cliente','Cidade','UF','URP','Data Impressão','Setor/Localização','Prazo Contratual','Prioridade','Prev. TEC','Data Concl. Produção','Data Coleta','Cor do Pedido','Persiana','Status'];
    // Helper: ISO → JS Date para que SheetJS grave como data Excel nativa
    const toDate = iso => {
      if(!iso) return '';
      try{ const d=new Date(iso+'T12:00:00'); return isNaN(d)?iso:d; }
      catch{ return iso; }
    };
    const rows=getOrderedPedidos().map(p=>[
      p.ano||'', (p.mes||'').replace(/^\d+\. /,''), p.numPed||'',
      COR_SEMANA_NOMES[p.corSemana]||'Branco',
      p.at||'', p.cliente||'', p.cidade||'', p.uf||'',
      p.urp||0,
      toDate(p.dtImp),
      p.setor||'',
      toDate(p.prazo),
      p.prior||'',
      toDate(p.prevTEC),
      toDate(p.conclProd),
      toDate(p.coleta),
      COR_PED_NOMES[p.corPed]||'Branco',
      p.persiana||'N/A', p.status||''
    ]);
    if(typeof XLSX==='undefined' || !XLSX.utils) throw new Error('Biblioteca XLSX indisponível');
    const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
    // Formata colunas de data (índices 9,11,13,14,15) como dd/mm/aaaa
    const dateCols=[9,11,13,14,15];
    const fmt='dd/mm/yyyy';
    rows.forEach((_,ri)=>{
      dateCols.forEach(ci=>{
        const addr=XLSX.utils.encode_cell({r:ri+1,c:ci});
        if(ws[addr] && ws[addr].t==='d'){
          ws[addr].z = fmt;
        }
      });
    });
    ws['!cols']=[{wch:6},{wch:12},{wch:6},{wch:14},{wch:12},{wch:30},{wch:18},{wch:6},{wch:8},{wch:14},{wch:16},{wch:16},{wch:12},{wch:14},{wch:18},{wch:14},{wch:16},{wch:12},{wch:14}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,'Pedidos',ws);
    const instrWs=XLSX.utils.aoa_to_sheet([
      ['INSTRUÇÕES DE IMPORTAÇÃO'],[''],
      ['Use a aba "Pedidos" como modelo para importação em massa.'],
      ['Campos obrigatórios: Pedido (AT), Cliente, URP'],
      ['Cor Semana: Branco, Rosa, Azul, Laranja, Verde, Vermelho ou Amarelo'],
      ['Cor Pedido: Branco, Preto ou Branco e Preto'],
      ['Datas: formato dd/mm/aaaa (geradas automaticamente pelo export)'],
      ['Prioridade: calculada automaticamente pelo prazo (não precisa preencher)'],
      ['Persiana: "N/A" ou número da persiana'],
    ]);
    XLSX.utils.book_append_sheet(wb,'Instruções',instrWs);
    XLSX.writeFile(wb,`weiku_pcp_${new Date().toISOString().split('T')[0]}.xlsx`);
    showToast(`${pedidos.length} pedidos exportados!`,'ok');
  } catch(e){
    console.warn('Falha no Excel, exportando CSV.', e);
    const headers=['Ano','Mês','ID/Seq','Cor Semana','Pedido (AT)','Cliente','Cidade','UF','URP','Data Impressão','Setor/Localização','Prazo Contratual','Prioridade','Prev. TEC','Data Concl. Produção','Data Coleta','Cor do Pedido','Persiana','Status'];
    const rows=getOrderedPedidos().map(p=>[
      p.ano||'', (p.mes||'').replace(/^\d+\. /,''), p.numPed||'', COR_SEMANA_NOMES[p.corSemana]||'',
      p.at||'', p.cliente||'', p.cidade||'', p.uf||'', p.urp||0, fmt(p.dtImp)||'', p.setor||'', fmt(p.prazo)||'',
      p.prior||'', fmt(p.prevTEC)||'', fmt(p.conclProd)||'', fmt(p.coleta)||'', COR_PED_NOMES[p.corPed]||'', p.persiana||'N/A', p.status||''
    ]);
    const csv = [headers,...rows].map(row=>row.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(';')).join('\n');
    const blob = new Blob(["\ufeff"+csv], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `weiku_pcp_${new Date().toISOString().split('T')[0]}.csv`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
    showToast('Excel indisponível. CSV exportado com sucesso.','info',4000);
  }
}

function previewImport(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'binary', cellDates:true, dateNF:'yyyy-mm-dd'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{header:1});
      if(data.length<2){ showToast('Arquivo vazio ou inválido.','err'); return; }
      const headers=data[0].map(h=>(h||'').toString().toLowerCase().trim());
      const findCol=(terms)=>{ for(const t of terms){const i=headers.findIndex(h=>h.includes(t));if(i>=0)return i;} return -1; };
      const cols={
        ano:     findCol(['ano']),
        mes:     findCol(['mês','mes']),
        numPed:  findCol(['id','seq','sequencial','nº']),
        corSem:  findCol(['cor semana','cor_semana','corsemana','cor da semana']),
        at:      findCol(['pedido','at']),
        cliente: findCol(['cliente','nome']),
        cidade:  findCol(['cidade']),
        uf:      findCol(['uf','estado']),
        urp:     findCol(['urp']),
        dtImp:   findCol(['impressão','impressao','data de impressão']),
        setor:   findCol(['localização','localizacao','setor']),
        prazo:   findCol(['prazo']),
        prevTEC: findCol(['prev. tec','prev tec','previsão tec','previsao tec']),
        conclProd: findCol(['concl','conclusão','conclusao','data concl']),
        coleta:  findCol(['coleta','data coleta']),
        corPed:  findCol(['cor do pedido','cor pedido','corpedido']),
        persiana:findCol(['persiana']),
        status:  findCol(['status']),
      };
      importData=data.slice(1).filter(r=>r.some(c=>c!=null&&c!=='')).map(r=>{
        // raw getter — preserves original type (numbers for dates/serial)
        const raw=i=>i>=0?r[i]:null;
        const g=i=>{ const v=raw(i); return v==null?'':String(v).trim(); };

        const at=g(cols.at);
        const cliente=g(cols.cliente);
        const urpRaw=parseFloat(g(cols.urp))||0;
        const erro=!at?'AT ausente':!cliente?'Cliente ausente':!urpRaw?'URP inválida':'';

        // Cor Semana: aceita índice (0-6) OU nome ("Branco", "Rosa"...)
        const corSemRaw = g(cols.corSem);
        const corSemNum = parseInt(corSemRaw);
        const corSemana = !isNaN(corSemNum) && corSemNum >= 0 && corSemNum <= 6
          ? corSemNum
          : Math.max(0, COR_SEMANA_NOMES.findIndex(n => n.toLowerCase()===corSemRaw.toLowerCase()));

        // Cor Pedido: aceita índice (0-2) OU nome ("Branco", "Preto", "Branco e Preto")
        const corPedRaw = g(cols.corPed);
        const corPedNum = parseInt(corPedRaw);
        const corPed = !isNaN(corPedNum) && corPedNum >= 0 && corPedNum <= 2
          ? corPedNum
          : Math.max(0, COR_PED_NOMES.findIndex(n => n.toLowerCase()===corPedRaw.toLowerCase()));

        // Mês: garante formato "N. NOME"
        let mesRaw = g(cols.mes).toUpperCase();
        if(mesRaw && !/^\d/.test(mesRaw)){
          const MESES=['JANEIRO','FEVEREIRO','MARÇO','ABRIL','MAIO','JUNHO','JULHO','AGOSTO','SETEMBRO','OUTUBRO','NOVEMBRO','DEZEMBRO'];
          const mi = MESES.findIndex(m=>mesRaw.includes(m));
          if(mi>=0) mesRaw = `${mi+1}. ${MESES[mi]}`;
        }

        return{
          at, cliente, urp:urpRaw,
          ano:  parseInt(g(cols.ano))||new Date().getFullYear(),
          mes:  mesRaw||'4. ABRIL',
          numPed: g(cols.numPed),
          corSemana,
          cidade: g(cols.cidade), uf: g(cols.uf).toUpperCase(),
          dtImp:    toISO(raw(cols.dtImp)),
          prazo:    toISO(raw(cols.prazo)),
          prevTEC:  toISO(raw(cols.prevTEC)),
          conclProd:toISO(raw(cols.conclProd)),
          coleta:   toISO(raw(cols.coleta)),
          corPed,
          setor: g(cols.setor)||'1. Corte',
          persiana: g(cols.persiana)||'N/A',
          status: g(cols.status)||'Em produção',
          _erro: erro
        };
      });
      render();
    } catch(ex){ showToast('Erro ao ler arquivo: '+ex.message,'err'); }
  };
  reader.readAsBinaryString(file);
}

async function executeImport(){
  const valid=importData.filter(r=>!r._erro);
  if(!valid.length){ showToast('Nenhuma linha válida para importar.','err'); return; }
  showLoading(`Importando ${valid.length} pedidos...`);
  let ok=0, upd=0, err=0;
  for(const row of valid){
    try{
      // Verifica se AT já existe
      const existing=pedidos.find(p=>p.at===row.at);
      const data={ ...row, prior:calcPrior(row.prazo), ordem: existing ? (existing.ordem || ((getOrderedPedidos().length+1)*10)) : ((getOrderedPedidos().length+1)*10), ressalvas:existing?undefined:[], atualizadoEm:firebase.firestore.FieldValue.serverTimestamp() };
      delete data._erro;
      if(existing){
        delete data.ressalvas;
        await db.collection('pedidos').doc(existing.id).update(data); upd++;
      } else {
        data.ressalvas=[];
        data.criadoPor=CU.uid; data.criadoPorNome=CU.name;
        data.criadoEm=firebase.firestore.FieldValue.serverTimestamp();
        await db.collection('pedidos').add(data); ok++;
      }
    } catch(e){ err++; console.error('Import error',e); }
  }
  hideLoading(); modalState=null; importData=[];
  showToast(`Importação concluída: ${ok} novos, ${upd} atualizados${err?`, ${err} erros`:''}!`, err?'info':'ok', 5000);
  render();
}

  </div></div>`;
}

function applyRoleDefaults(){
  const role=($('fu-role')||{value:'viewer'}).value;
  const defs=ROLE_DEFAULTS[role]||{};
  ALL_PERMISSIONS.forEach(p=>{ const el=$(`perm-${p.key}`); if(el) el.checked=!!(defs[p.key]); });
}

async function salvarNovoUser(){
  const name  = ($('fu-name')||{value:''}).value.trim();
  const email = ($('fu-email')||{value:''}).value.trim().toLowerCase();
  const role  = ($('fu-role')||{value:'viewer'}).value;
  if(!name||!email){ showToast('Preencha nome e e-mail.','err'); return; }
  const permissions={};
  ALL_PERMISSIONS.forEach(p=>{ const el=$(`perm-${p.key}`); if(el) permissions[p.key]=el.checked?1:0; });
  showLoading('Salvando...');
  try{
    const existing = await db.collection('users').where('email','==',email).limit(1).get();
    const payload = {
      name,
      email,
      emailOriginal: ($('fu-email')||{value:''}).value.trim(),
      role,
      permissions,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    };

    if(!existing.empty){
      await existing.docs[0].ref.set(payload, { merge:true });
    } else {
      const docId='email_'+email.replace(/[^a-z0-9]/gi,'_');
      await db.collection('users').doc(docId).set({
        ...payload,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        pendingAuthLink:true
      }, { merge:true });
    }

    hideLoading(); modalState=null;
    showToast('Perfil salvo! Quando esse usuário fizer login pela primeira vez, o perfil será vinculado automaticamente ao UID do Firebase.','ok',6000);
    await loadUsers(); render();
  } catch(e){ hideLoading(); showToast('Erro: '+e.message,'err'); }
}

function renderModalEditUser(){
  const u=allUsers.find(x=>x.uid===editUserId); if(!u) return '';
  const permCheckboxes=ALL_PERMISSIONS.map(p=>`
    <div class="perm-item">
      <input type="checkbox" id="eperm-${p.key}" ${(u.permissions||{})[p.key]?'checked':''} />
      <label for="eperm-${p.key}">${p.label}</label>
    </div>`).join('');
  return `<div class="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" onclick="event.stopPropagation()">

          ${['viewer','almox','producao','admin'].map(r=>`<option value="${r}" ${u.role===r?'selected':''}>${{viewer:'Visualizador',almox:'Almoxarifado',producao:'Produção',admin:'Administrador'}[r]}</option>`).join('')}
        </select>
      </div>

  const name=($('eu-name')||{value:''}).value.trim();

}

        let metaBatchId = null;
        snap.forEach(doc=>{
          const d = doc.data() || {};
          if(doc.id === '_meta' || d.kind === 'meta'){
            metaBatchId = d.currentBatchId || null;
            return;
          }
          imported.push({...d, _fsId: doc.id});
        });
        estCurrentBatchId = metaBatchId;
        const visible = imported;
        visible.sort((a,b)=>Number(a.id||0)-Number(b.id||0));
        estItems = visible;
        estUsingLocalFallback = false;
        estClearLocalImport();
        estLastSync = new Date();
      }else if(localImport && Array.isArray(localImport.items) && localImport.items.length){
        estItems = localImport.items.map(r=>({...r}));
        estCurrentBatchId = 'local-fallback';
        estUsingLocalFallback = true;
        estLastSync = new Date(localImport.savedAt || Date.now());
      }else{
        estItems = ESTOQUE_SEED.map(r=>({...r}));
        estCurrentBatchId = null;
        estUsingLocalFallback = false;
      }
      if(activePage==='estoque') render();
    },()=>{
      if(localImport && Array.isArray(localImport.items) && localImport.items.length){
        estItems = localImport.items.map(r=>({...r}));
        estCurrentBatchId = 'local-fallback';
        estUsingLocalFallback = true;
        estLastSync = new Date(localImport.savedAt || Date.now());
        if(activePage==='estoque') render();
      }
    });
  }catch(e){}
}

async function saveEstoqueItem(item){

  };
  try{

// ── Status ────────────────────────────────────────────────────
function estStatus(item){
  const s=item.saldo||0;
  if(s===0) return 'zerado';
  if(item.min==null||item.max==null) return 'analisar';
  if(s<item.min) return 'critico';
  if(s<item.max*0.5) return 'warn';
  return 'ok';
}
function estStatusBadge(item){
  const st=estStatus(item);
  const labels={ok:'✓ Ok',critico:'⚠ Crítico',warn:'↓ Baixo',zerado:'○ Zerado',analisar:'? Analisar'};
  const cls={ok:'badge-ok',critico:'badge-critico',warn:'badge-warn',zerado:'badge-zerado',analisar:'badge-analisar'};
  return `<span class="est-badge ${cls[st]}">${labels[st]}</span>`;
}
function estSaldoClass(item){
  const st=estStatus(item);
  if(st==='ok') return 'est-saldo-ok';
  if(st==='critico') return 'est-saldo-crit';
  if(st==='warn') return 'est-saldo-warn';
  if(st==='zerado') return 'est-saldo-zero';
  return '';
}
function estBar(item){
  if(item.max==null||item.max===0) return '';
  const pct=Math.min(100,((item.saldo||0)/item.max)*100);
  const st=estStatus(item);
  const cls=st==='critico'?'bar-crit':st==='warn'?'bar-warn':pct>100?'bar-over':'bar-ok';
  return `<span class="est-bar-wrap"><div class="est-bar-bg"><div class="est-bar-fill ${cls}" style="width:${pct}%"></div></div></span>`;
}

// ── KPIs ──────────────────────────────────────────────────────
function estKpis(){
  const statuses=estItems.map(estStatus);
  return {
    total:estItems.length,
    ok:statuses.filter(s=>s==='ok').length,
    analisar:statuses.filter(s=>s==='analisar').length,
    critico:statuses.filter(s=>s==='critico'||s==='warn').length,
    zerado:statuses.filter(s=>s==='zerado').length
  };
}

// ── Filtro + Busca ────────────────────────────────────────────
function estFiltered(){
  let arr=[...estItems];
  if(estFilter==='ok') arr=arr.filter(x=>estStatus(x)==='ok');
  else if(estFilter==='analisar') arr=arr.filter(x=>estStatus(x)==='analisar');
  else if(estFilter==='critico') arr=arr.filter(x=>['critico','warn'].includes(estStatus(x)));
  else if(estFilter==='zerado') arr=arr.filter(x=>estStatus(x)==='zerado');
  if(estCatFilter!=='todos') arr=arr.filter(x=>estCategoriaGrupo(x.categoria) === estCatFilter);
  if(estSearch.trim()){
    const q=estSearch.toLowerCase();
    arr=arr.filter(x=>String(x.codigo||'').toLowerCase().includes(q)||String(x.descricao||'').toLowerCase().includes(q));
  }
  arr.sort((a,b)=>{
    let av=a[estSortCol],bv=b[estSortCol];
    if(av==null) av=estSortDir===1?Infinity:-Infinity;
    if(bv==null) bv=estSortDir===1?Infinity:-Infinity;
    if(typeof av==='string') return estSortDir*String(av).localeCompare(String(bv));
    return estSortDir*(av-bv);
  });
  return arr;
}
function estSetSort(col){ if(estSortCol===col) estSortDir*=-1; else{estSortCol=col;estSortDir=1;} render(); }
function estSetFilter(f){ estFilter=f; render(); }
function estSetCatFilter(c){ estCatFilter=c; render(); }

// ── Helpers ───────────────────────────────────────────────────
function fmtN(v){
  if(v==null) return '—';
  const n=Number(v); if(isNaN(n)) return String(v);
  return n%1===0?n.toLocaleString('pt-BR'):n.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:2});
}
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function estNormalizaCodigoBusca(code){
  return String(code || '').trim().toUpperCase().replace(/\s+/g,'');
}

function estCodigoSomenteDigitos(code){
  const raw = estNormalizaCodigoBusca(code);
  return /^\d+$/.test(raw) ? String(Number(raw)) : raw;
}

function estLocalizarItemPorCodigo(code){
  const normal = estNormalizaCodigoBusca(code);
  const compacto = estCodigoSomenteDigitos(code);
  return estItems.find(x => {
    const codItem = estNormalizaCodigoBusca(x.codigo || '');
    if(codItem === normal) return true;
    if(/^\d+$/.test(codItem) && compacto === String(Number(codItem))) return true;
    return false;
  }) || null;
}

function estResetEntradaState(){
  estEntradaState = {
    xmlInfo: null,
    rows: [],
    manualItemId: '',
    manualQty: '',
    manualObs: '',
    manualNF: '',
    lastReport: null
  };
}

function estParseQtySmart(raw){
  let s = String(raw || '').trim();
  if(!s) return 0;
  s = s.replace(/\s+/g, '');
  const hasComma = s.includes(',');
  const hasDot = s.includes('.');
  if(hasComma && hasDot){
    if(s.lastIndexOf(',') > s.lastIndexOf('.')) s = s.replace(/\./g, '').replace(',', '.');
    else s = s.replace(/,/g, '');
  }else if(hasComma){
    s = s.replace(',', '.');
  }
  const n = Number(s);
  return Number.isFinite(n) ? n : 0;
}

function estParseXmlEntrada(xmlText){
  const parser = new DOMParser();
  const xml = parser.parseFromString(xmlText, 'application/xml');
  if(xml.querySelector('parsererror')) throw new Error('XML inválido ou não reconhecido.');

  const getText = (ctx, tags) => {
    for(const tag of tags){
      const el = ctx.querySelector(tag);
      if(el && el.textContent != null && String(el.textContent).trim()) return String(el.textContent).trim();
    }
    return '';
  };

  const nNF = getText(xml, ['nNF']);
  const serie = getText(xml, ['serie']);
  const dhEmi = getText(xml, ['dhEmi','dEmi']);
  const fornecedor = getText(xml, ['emit > xNome','emit xNome']);
  const chave = getText(xml, ['protNFe chNFe','infProt chNFe','infNFe Id']);

  const dets = Array.from(xml.getElementsByTagName('det'));
  const rows = dets.map((det, idx) => {
    const prod = det.getElementsByTagName('prod')[0] || det;
    const codigoNF = getText(prod, ['cProd']) || `ITEM-${idx+1}`;
    const descricaoNF = getText(prod, ['xProd']) || codigoNF;
    const unidadeXml = getText(prod, ['uCom','uTrib']) || 'UN';
    const qtyNF = estParseQtySmart(getText(prod, ['qCom','qTrib']) || '0');
    const itemBase = estLocalizarItemPorCodigo(codigoNF);
    return {
      origem: 'xml',
      matched: !!itemBase,
      itemId: itemBase ? itemBase.id : null,
      codigoNF,
      codigoBase: itemBase ? itemBase.codigo : '',
      descricaoNF,
      descricaoBase: itemBase ? itemBase.descricao : '',
      unidade: itemBase ? (itemBase.unidade || unidadeXml || 'UN') : (unidadeXml || 'UN'),
      qtyNF,
      qtyRecebida: qtyNF,
      observacao: '',
      saldoAtual: itemBase ? Number(itemBase.saldo || 0) : null,
      cadastroCategoria: itemBase ? estNormalizarCategoria(itemBase.categoria || '') : '',
      cadastroUnidade: itemBase ? (itemBase.unidade || unidadeXml || 'UN') : (unidadeXml || 'UN'),
      cadastroDescricao: itemBase ? (itemBase.descricao || descricaoNF) : descricaoNF
    };
  });

  return {
    xmlInfo: { nNF, serie, dhEmi, fornecedor, chave },
    rows
  };
}

function estEntradaResumo(rows){
  const validos = rows.filter(r => r.matched);
  const divergentes = validos.filter(r => Number(r.qtyRecebida || 0) !== Number(r.qtyNF || 0));
  const faltas = validos.filter(r => Number(r.qtyRecebida || 0) < Number(r.qtyNF || 0));
  const sobras = validos.filter(r => Number(r.qtyRecebida || 0) > Number(r.qtyNF || 0));
  const naoCadastrados = rows.filter(r => !r.matched);
  return {
    total: rows.length,
    validos: validos.length,
    divergentes: divergentes.length,
    faltas: faltas.length,
    sobras: sobras.length,
    naoCadastrados: naoCadastrados.length
  };
}

function estEntradaStatusRow(row){
  if(!row.matched) return {txt:'Código não cadastrado', cls:'badge-critico'};
  if(row.origem === 'manual') return {txt:'Manual', cls:'badge-ok'};
  const nf = Number(row.qtyNF || 0);
  const rec = Number(row.qtyRecebida || 0);
  if(rec === nf) return {txt:'Conferido', cls:'badge-ok'};
  if(rec < nf) return {txt:'Falta', cls:'badge-critico'};
  return {txt:'Sobra', cls:'badge-warn'};
}

function estImportarXmlEntrada(){
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.xml,text/xml,application/xml';
  inp.onchange = async (ev) => {
    const file = ev.target && ev.target.files && ev.target.files[0];
    if(!file) return;
    showLoading('Lendo XML da nota fiscal...');
    try{
      const xmlText = await file.text();
      const parsed = estParseXmlEntrada(xmlText);
      estEntradaState.xmlInfo = { ...(parsed.xmlInfo || {}), fileName: file.name };
      estEntradaState.rows = parsed.rows || [];
      estEntradaState.lastReport = null;
      hideLoading();
      const resumo = estEntradaResumo(estEntradaState.rows);
      showToast(`XML carregado: ${resumo.total} item(ns), ${resumo.validos} reconhecido(s), ${resumo.naoCadastrados} não cadastrado(s).`, resumo.naoCadastrados ? 'info' : 'ok', 7000);
      render();
    }catch(err){
      hideLoading();
      showToast('Erro ao ler XML: ' + err.message,'err',7000);
    }
  };
  inp.click();
}

async function estCadastrarItemPendente(index){
  const row = estEntradaState.rows[index];
  if(!row || row.matched) return;
  const codigo = String(row.codigoNF || '').trim();
  const descricao = String(row.cadastroDescricao || row.descricaoNF || '').trim();
  const categoria = estNormalizarCategoria(row.cadastroCategoria || '');
  const unidade = String(row.cadastroUnidade || row.unidade || '').trim();
  if(!codigo){ showToast('Código do item não informado.','err'); return; }
  if(estLocalizarItemPorCodigo(codigo)){ showToast('Este código já existe no cadastro.','err'); return; }
  if(!descricao){ showToast('Informe a descrição para o novo cadastro.','err'); return; }
  if(!['PVC','ALU','AÇO','ACE'].includes(categoria)){ showToast('Selecione a categoria do item não cadastrado.','err'); return; }
  if(!unidade){ showToast('Informe a unidade de medida do item.','err'); return; }

  const novoId = estItems.reduce((acc, item) => Math.max(acc, Number(item.id || 0)), 0) + 1;
  const novoItem = {
    id: novoId,
    codigo,
    descricao,
    categoria,
    unidade,
    saldo: 0,
    sap: null,
    min: null,
    max: null,
    analise: 'Analisar',
    batchId: estCurrentBatchId || null
  };

  showLoading('Cadastrando item novo...');
  const ok = await saveEstoqueItem(novoItem);
  hideLoading();
  if(!ok) return;

  estItems.push(novoItem);
  row.matched = true;
  row.itemId = novoId;
  row.codigoBase = codigo;
  row.descricaoBase = descricao;
  row.unidade = unidade;
  row.cadastroCategoria = categoria;
  row.cadastroUnidade = unidade;
  row.cadastroDescricao = descricao;
  row.saldoAtual = 0;
  row.recentCadastroUntil = Date.now() + (20 * 60 * 1000);
  estRecentCadastros[codigo] = row.recentCadastroUntil;
  estEntradaState.lastReport = null;
  showToast(`Cadastro criado para ${codigo}.`, 'ok');
  render();
}

function estAdicionarManualEntrada(){
  const itemId = Number(estEntradaState.manualItemId || 0);
  const qty = Number(estEntradaState.manualQty || 0);
  const obs = String(estEntradaState.manualObs || '').trim();
  const nfNum = String(estEntradaState.manualNF || '').trim();
  if(!itemId){ showToast('Selecione um item cadastrado para adição manual.','err'); return; }
  if(!qty || qty <= 0){ showToast('Informe uma quantidade válida para entrada manual.','err'); return; }
  const item = estItems.find(x => Number(x.id) === itemId);

  estEntradaState.rows.push({
    origem: 'manual',
    matched: true,
    itemId: item.id,
    codigoNF: item.codigo,
    codigoBase: item.codigo,
    descricaoNF: item.descricao,
    descricaoBase: item.descricao,
    unidade: item.unidade || 'UN',
    qtyNF: qty,
    qtyRecebida: qty,
    observacao: obs,
    nfNumero: nfNum,

  estEntradaState.manualObs = '';
  estEntradaState.lastReport = null;
  render();
}

async function estConfirmarEntradaMaterial(){
  const rows = Array.isArray(estEntradaState.rows) ? estEntradaState.rows : [];
  if(!rows.length){ showToast('Nenhum item carregado para entrada.','err'); return; }
  const validos = rows.filter(r => r.matched && Number(r.qtyRecebida || 0) > 0);
  if(!validos.length){ showToast('Não há itens válidos com quantidade recebida para lançar.','err'); return; }

  const resumo = estEntradaResumo(rows);
  const report = {
    origem: estEntradaState.xmlInfo ? 'xml' : 'manual',
    xmlInfo: estEntradaState.xmlInfo || null,
    resumo,
    itens: rows.map(r => ({
      origem: r.origem || 'xml',
      itemId: r.itemId || null,
      codigoNF: r.codigoNF || '',
      codigoBase: r.codigoBase || '',
      descricaoNF: r.descricaoNF || '',
      descricaoBase: r.descricaoBase || '',
      qtyNF: Number(r.qtyNF || 0),
      qtyRecebida: Number(r.qtyRecebida || 0),
      unidade: r.unidade || '',
      matched: !!r.matched,
      divergencia: Number(r.qtyRecebida || 0) - Number(r.qtyNF || 0),
      observacao: r.observacao || ''
    })),
    criadoEm: new Date().toISOString(),
    criadoPor: CU ? CU.name : 'sistema',
    criadoPorId: CU ? CU.uid : ''
  };

  showLoading('Confirmando entrada de material...');
  try{
    for(const row of validos){
      const idx = estItems.findIndex(x => Number(x.id) === Number(row.itemId));
      if(idx < 0) continue;
      const item = estItems[idx];
      const qty = Number(row.qtyRecebida || 0);
      const novoSaldo = parseFloat(((Number(item.saldo) || 0) + qty).toFixed(2));
      estItems[idx] = {...item, saldo: novoSaldo};
      const docId = 'item_' + String(item.id);
      await db.collection('estoque').doc(docId).set({
        ...estItems[idx],
        updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedBy: CU ? CU.name : 'sistema'
      }, {merge:true});
      await db.collection('estoque_log').add({
        tipo: 'entrada',
        origem: row.origem || 'xml',
        itemId: item.id,
        codigo: item.codigo,
        descricao: item.descricao,
        categoria: item.categoria || '',
        quantidade: qty,
        quantidadeNF: Number(row.qtyNF || 0),
        saldoAntes: Number(item.saldo || 0),
        saldoDepois: novoSaldo,
        setor: 'Almoxarifado',
        nfNumero: row.nfNumero || (estEntradaState.xmlInfo && estEntradaState.xmlInfo.nNF) || '',
        observacao: row.observacao || ((Number(row.qtyRecebida || 0) !== Number(row.qtyNF || 0)) ? 'Divergência identificada na entrada' : 'Entrada por NF/XML'),
        usuario: CU ? CU.name : 'desconhecido',
        usuarioId: CU ? CU.uid : '',
        data: new Date().toISOString(),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
    // Reset da tela e toast ANTES de qualquer gravação extra opcional
    // (assim mesmo que ocorra um erro posterior a entrada já está confirmada e a tela zerada)
    const relatorioFinal = { ...report };
    estResetEntradaState();
    estEntradaState.lastReport = relatorioFinal;
    hideLoading();
    showToast(`✓ Entrada concluída: ${validos.length} item(ns) lançados. Divergências: ${resumo.divergentes}. Não cadastrados: ${resumo.naoCadastrados}.`, resumo.divergentes || resumo.naoCadastrados ? 'info' : 'ok', 8000);
    estGerarRelatorioPDF(relatorioFinal);
    render();
  }catch(err){
    hideLoading();
    showToast('Erro ao confirmar entrada: ' + err.message,'err',7000);
  }
}

// ── Modal de edição ───────────────────────────────────────────
function estOpenNovoItem(){
  const novoId = estItems.reduce((acc,item)=>Math.max(acc, Number(item.id||0)), 0) + 1;
  estModalItem = {
    id: novoId,
    codigo: '',
    descricao: '',
    categoria: 'PVC',
    unidade: 'Mts',
    saldo: 0,
    sap: null,
    min: null,
    max: null,
    analise: 'Analisar',
    __novo: true
  };
  estEditDraft = {...estModalItem};
  render();
}
function estOpenEdit(id){
  const item=estItems.find(x=>x.id===id);
  if(!item) return;
  estModalItem={...item};
  estEditDraft={...item};
  render();
}
function estCloseModal(){ estModalItem=null; estEditDraft={}; render(); }

function estDraftChange(field,value){
  if(field==='saldo'||field==='sap'||field==='min'||field==='max'){
    estEditDraft[field]=value===''||value==null?null:Number(value);
  } else { estEditDraft[field]=value; }
  const diffEl=document.getElementById('est-saldo-diff');
  if(diffEl&&field==='saldo'){
    const orig=estModalItem?Number(estModalItem.saldo||0):0;
    const novo=Number(estEditDraft.saldo)||0;
    const diff=novo-orig;
    if(diff===0) diffEl.innerHTML='<span class="est-diff est-diff-neu">Sem alteração no saldo</span>';
    else diffEl.innerHTML=`<span class="est-diff ${diff>0?'est-diff-pos':'est-diff-neg'}">${diff>0?'+':''}${fmtN(diff)} em relação ao atual (${fmtN(orig)})</span>`;
  }
}

async function estSaveEdit(){
  if(!estEditDraft) return;
  if(!String(estEditDraft.codigo||'').trim()){ showToast('Código é obrigatório.','err'); return; }
  if(!String(estEditDraft.descricao||'').trim()){ showToast('Descrição é obrigatória.','err'); return; }
  const original = estItems.find(x=>Number(x.id)===Number(estEditDraft.id));
  if(!original && estItems.some(x=>String(x.codigo||'').trim().toLowerCase()===String(estEditDraft.codigo||'').trim().toLowerCase())){
    showToast('Já existe um item cadastrado com este código.','err');
    return;
  }
  // Preserve saldo em item existente — alteração de saldo só via Baixa ou Ajuste.
  // Em item novo, permite saldo inicial.
  const safePayload = {
    ...estEditDraft,
    id: Number(estEditDraft.id),
    saldo: original ? original.saldo : (Number(estEditDraft.saldo)||0),
    sap: estEditDraft.sap==='' ? null : estEditDraft.sap,
    min: estEditDraft.min==='' ? null : estEditDraft.min,
    max: estEditDraft.max==='' ? null : estEditDraft.max,
    analise: estEditDraft.analise || 'Analisar'
  };
  delete safePayload.__novo;
  const idx=estItems.findIndex(x=>Number(x.id)===Number(safePayload.id));
  if(idx>=0) estItems[idx]={...estItems[idx],...safePayload};
  else estItems.push(safePayload);
  showLoading('Salvando...');
  const ok=await saveEstoqueItem(safePayload);
  hideLoading();
  if(ok){ showToast(original ? 'Cadastro atualizado!' : 'Novo item cadastrado!','ok'); estCloseModal(); }
}

function estExportXlsx(){
  if(typeof XLSX==='undefined'){ showToast('SheetJS não disponível.','err'); return; }
  const rows=estFiltered().map(x=>({
    '#':x.id,
    'Código':x.codigo,
    'Categoria':estCategoriaRotulo(x.categoria),
    'Descrição':x.descricao,
    'Unidade':x.unidade||'Mts',
    'Saldo Atual':x.saldo,
    'Estoque SAP':x.sap,
    'Est. Mínimo':x.min,
    'Est. Máximo':x.max
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:5},{wch:28},{wch:12},{wch:55},{wch:8},{wch:12},{wch:12},{wch:10},{wch:10}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Estoque');
  const d=new Date(),ts=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  XLSX.writeFile(wb,`Estoque_TEC_PVC_${ts}.xlsx`);
  showToast(`${rows.length} itens exportados para Excel.`,'ok');
}

function parseFabricacaoPdfText(rawText, fileName=''){
  const raw = String(rawText||'');

  // ── Extract AT number ──────────────────────────────────────
  const pedidoMatch = raw.match(/Pedido\s+(AT\d+)/i);
  const atNum = pedidoMatch ? pedidoMatch[1].trim() : '';

  // ── Extract client name ───────────────────────────────────
  // Format: "Cliente: <blank line> Cliente: <id> <name>" or "Construtora..."
  const clienteMatch = raw.match(/Construtora\s+\S+(?:\s+\S+)?/i)
    || raw.match(/\d{6}\s+([A-Z][^\n]+)/m);
  const clienteNome = clienteMatch ? clienteMatch[0].trim() : '';

  // ── Parse position lines ──────────────────────────────────
  // Winkhaus "Tempos de Fabricação" format:
  // Each data line: POS  QUANT  FORMAT  LARGURA  ALTURA  ...16 numeric cols...  SOMA  TOTAL  URP
  // POS examples: 12, 12.1, 13, 22.1, 36.2
  // FORMAT examples: 1×1, 2×1, 3×1, 5×1, 2×2
  // URP is the LAST column ("unidades")
  // The "47" total line has no FORMAT column — skip it
  const LINE_RE = /^(\d+(?:\.\d+)?)\s+(\d+)\s+(\d+[×xX]\d+)\s+\d+\s+\d+(?:\s+[\d,.]+){15,}\s+([\d,.]+)\s+([\d,.]+)\s+([\d,.]+)\s*$/;

  function parsePtBr(s){
    // Handle both "4,84" and "12.92" and "3.388,15"
    const str = String(s||'').trim();
    if(/^\d{1,3}(?:\.\d{3})+,\d+$/.test(str)) return parseFloat(str.replace(/\./g,'').replace(',','.'));
    return parseFloat(str.replace(',','.')) || 0;
  }

  // Split raw text into lines — PDF.js may join items with spaces on same line
  // so we also try splitting on patterns that look like a new position start
  const lines = raw
    .replace(/(\d+(?:\.\d+)?)\s+(\d+)\s+(\d+[×xX]\d+)/g, '\n$1 $2 $3')
    .split(/\r?\n/)
    .map(s => s.trim())
    .filter(Boolean);

  const posicoes = [];
  const seen = new Set();

  for(const line of lines){
    const m = LINE_RE.exec(line);
    if(!m) continue;
    const posicao = m[1];
    if(seen.has(posicao)) continue;
    seen.add(posicao);
    const quantidade = parseInt(m[2]) || 1;
    const formato = m[3];
    const urp = parsePtBr(m[6]); // last column = "unidades"
    posicoes.push({
      posicao,
      quantidade,
      formato,
      urp,
      conferido: false,
      conferidoEm: '',
      conferidoPor: '',
      observacao: ''
    });
  }

  // Sort numerically: 12 < 12.1 < 13 < 22.1
  posicoes.sort((a, b) => {
    const [aMain, aSub='0'] = a.posicao.split('.');
    const [bMain, bSub='0'] = b.posicao.split('.');
    const mainDiff = parseInt(aMain) - parseInt(bMain);
    return mainDiff !== 0 ? mainDiff : parseInt(aSub) - parseInt(bSub);
  });

  const totalUrp = posicoes.reduce((s, i) => s + (i.urp || 0), 0);
  const totalQuadros = posicoes.reduce((s, i) => s + (i.quantidade || 1), 0);

  return {
    fileName,
    at: atNum,
    cliente: clienteNome,
    posicoes,
    totalPosicoes: posicoes.length,
    totalQuadros,
    totalUrp
  };
}

async function importarChecklistPdf(input){
  const file = input && input.files && input.files[0];
  if(!file) return;
  if(typeof pdfjsLib === 'undefined'){
    showToast('PDF.js não carregado. Aguarde e tente novamente.','err',4000);
    return;
  }
  pdfImportBusy = true;
  render();
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
    let rawText = '';
    for(let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
      const page = await pdf.getPage(pageNo);
      const content = await page.getTextContent();
      // Build page text preserving line breaks by using Y-position grouping
      const items = content.items;
      const byY = {};
      for(const item of items){
        if(!item.str || !item.str.trim()) continue;
        const y = Math.round(item.transform[5]);
        if(!byY[y]) byY[y] = [];
        byY[y].push(item.str);
      }
      // Sort by Y descending (top of page first), join tokens on same line with space
      const sortedYs = Object.keys(byY).map(Number).sort((a,b)=>b-a);
      for(const y of sortedYs){
        rawText += byY[y].join(' ') + '\n';
      }
    }
    const parsed = parseFabricacaoPdfText(rawText, file.name);
    if(!parsed.posicoes.length){
      showToast('PDF lido mas nenhuma posição encontrada. Verifique se é um PDF de fabricação Winkhaus.','err',6000);
      pdfImportBusy = false;
      render();
      return;
    }
    updateNovoPedidoChecklistMeta(parsed);
    // Pre-fill AT, cliente and URP — PDF data takes priority
    if(parsed.at) novoPedidoDraft['f-at'] = parsed.at;
    if(parsed.cliente) novoPedidoDraft['f-cli'] = parsed.cliente;
    if(parsed.totalUrp > 0) novoPedidoDraft['f-urp'] = parsed.totalUrp.toFixed(2);
    showToast(`✓ PDF lido: ${parsed.totalPosicoes} posições · ${parsed.totalQuadros} quadros · URP ${parsed.totalUrp.toFixed(2)}`, 'ok', 5000);
  } catch(e){
    showToast('Erro ao ler PDF: ' + e.message, 'err', 6000);
    console.error('importarChecklistPdf error:', e);
  } finally {
    pdfImportBusy = false;
    render();
  }
}

async function importarPdfPedidoExistente(input, pedidoId){
  const file = input && input.files && input.files[0];
  if(!file) return;
  if(typeof pdfjsLib === 'undefined'){
    showToast('PDF.js não carregado. Aguarde e tente novamente.','err',4000);
    return;
  }
  const btn = document.getElementById('btn-import-pdf-existente');
  if(btn){ btn.disabled = true; btn.textContent = '⏳ Lendo PDF...'; }
  try{
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const buffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
    let rawText = '';
    for(let pageNo = 1; pageNo <= pdf.numPages; pageNo++){
      const page = await pdf.getPage(pageNo);
      const pgContent = await page.getTextContent();
      const byY = {};
      for(const item of pgContent.items){
        if(!item.str || !item.str.trim()) continue;
        const y = Math.round(item.transform[5]);
        if(!byY[y]) byY[y] = [];
        byY[y].push(item.str);
      }
      const sortedYs = Object.keys(byY).map(Number).sort((a,b)=>b-a);
      for(const y of sortedYs){ rawText += byY[y].join(' ') + String.fromCharCode(10); }
    }
    const parsed = parseFabricacaoPdfText(rawText, file.name);
    if(!parsed.posicoes.length){
      showToast('PDF lido mas nenhuma posição encontrada. Verifique se é o PDF de fabricação Winkhaus.','err',6000);
      return;
    }
    const itens = parsed.posicoes.map(pos => ({
      posicao:       pos.posicao,
      quantidade:    pos.quantidade,
      formato:       pos.formato,
      urp:           pos.urp,
      conferido:     false,
      conferidoEm:   '',
      conferidoPor:  '',
      observacao:    ''
    }));
    showLoading('Salvando checklist...');
    await savePedido({
      checklistExpedicao: itens,
      totalPosicoes:      parsed.totalPosicoes,
      urpChecklist:       Number(parsed.totalUrp.toFixed(2)),
      pdfChecklistNome:   parsed.fileName
    }, pedidoId);
    hideLoading();
    showToast(`✓ PDF importado: ${parsed.totalPosicoes} posições · ${parsed.totalQuadros} quadros · URP ${parsed.totalUrp.toFixed(2)}`, 'ok', 5000);
    render();
  } catch(e){
    hideLoading();
    showToast('Erro ao ler PDF: ' + e.message, 'err', 6000);
    console.error('importarPdfPedidoExistente error:', e);
  } finally {
    if(btn){ btn.disabled = false; btn.textContent = '📄 Importar PDF de fabricação'; }
    input.value = '';
  }
}

  itens[idx].conferido = !!checked;

function estNormalizarCategoria(cat){
  const raw = String(cat || '').trim().toUpperCase();

  // Respeita o valor explícito da planilha/cadastro.
  // Nada de inferir pela descrição, porque isso estava distorcendo a categoria real.
  if(!raw) return '';
  if(raw === 'PVC') return 'PVC';
  if(raw === 'ALU' || raw === 'ALUMÍNIO' || raw === 'ALUMINIO') return 'ALU';
  if(raw === 'AÇO' || raw === 'ACO') return 'AÇO';
  if(raw === 'ACE' || raw === 'ACESSÓRIOS' || raw === 'ACESSORIOS' || raw === 'ACESSORIO' || raw === 'ACESSÓRIO') return 'ACE';
  return raw;
}

function estCategoriaGrupo(cat){
  const norm = estNormalizarCategoria(cat);
  if(norm === 'PVC') return 'PVC';
  return norm || '';
}

function estCategoriaRotulo(cat){
  return estNormalizarCategoria(cat) || '—';
}

function estCategoriaBadge(cat){
  const key = estCategoriaRotulo(cat);
  const styles = {
    'ALU':'background:#fff8e1;color:#e65100',
    'AÇO':'background:#fce4ec;color:#880e4f',
    'ACE':'background:#f3e5f5;color:#6a1b9a'
  };
  const st = styles[key] || 'background:#f5f5f5;color:#777';
  return '<span class="est-cat-badge" style="'+st+'">'+(key||'—')+'</span>';
}
